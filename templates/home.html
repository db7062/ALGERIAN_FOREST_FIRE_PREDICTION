<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FWI Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f5f7fa;
        }
        .container-box {
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            background: white;

            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        .result {
            text-align: center;
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #2c7be5;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="container-box">
        <h1>FWI Prediction</h1>

        <!-- Form -->
        <form action="{{ url_for('predict_datapoint') }}" method="post">
            
            <input type="text" class="form-control mb-2" name="Temperature" placeholder="Temperature" required>
            
            <input type="text" class="form-control mb-2" name="RH" placeholder="Relative Humidity (RH)" required>
            
            <input type="text" class="form-control mb-2" name="Ws" placeholder="Wind Speed (Ws)" required>
            
            <input type="text" class="form-control mb-2" name="Rain" placeholder="Rain" required>
            
            <input type="text" class="form-control mb-2" name="FFMC" placeholder="FFMC" required>
            
            <input type="text" class="form-control mb-2" name="DMC" placeholder="DMC" required>
            
            <input type="text" class="form-control mb-2" name="ISI" placeholder="ISI" required>
            
            <input type="text" class="form-control mb-2" name="Classes" placeholder="Classes" required>
            
            <input type="text" class="form-control mb-3" name="Region" placeholder="Region" required>

            <button type="submit" class="btn btn-primary w-100">Predict</button>
        </form>

        <!-- Result -->
        
        <div class="result">
            THE FWI prediction is {{ results }}
        </div>
      
    </div>
</div>

</body>
</html>
